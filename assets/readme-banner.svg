<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">Overclocked game banner</title>
  <desc id="desc">A retro terminal interface showing an old computer, running programs, and a technical store.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061117"/>
      <stop offset=".55" stop-color="#09202a"/>
      <stop offset="1" stop-color="#041015"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103d43"/>
      <stop offset="1" stop-color="#061d21"/>
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5H8" stroke="#a6ffff" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1600" height="640" fill="url(#bg)"/>
  <rect width="1600" height="640" fill="url(#scan)"/>
  <path d="M0 78H1600M515 78V640M1120 78V640" stroke="#47727b" stroke-width="3"/>
  <path d="M0 83H1600M520 83V640M1125 83V640" stroke="#071014" stroke-width="7"/>

  <text x="46" y="51" fill="#baf8ef" font-family="monospace" font-size="27" font-weight="700" letter-spacing="5">OVERCLOCKED!</text>
  <text x="1552" y="48" fill="#759ca1" font-family="monospace" font-size="15" text-anchor="end">BUILD // RUN // SCALE // REPEAT</text>

  <text x="255" y="144" fill="#d7fffb" font-family="monospace" font-size="42" font-weight="700" text-anchor="middle">1,245,800 BYTES</text>
  <text x="255" y="177" fill="#75bcc4" font-family="monospace" font-size="18" text-anchor="middle">4,500 BYTES PER SECOND</text>

  <g transform="translate(75 222)">
    <rect x="55" y="0" width="250" height="184" rx="9" fill="#b4a585" stroke="#e1d2ae" stroke-width="5"/>
    <rect x="76" y="20" width="208" height="135" rx="12" fill="#252921" stroke="#625e4c" stroke-width="9"/>
    <rect x="92" y="34" width="176" height="105" rx="9" fill="url(#screen)"/>
    <path d="M112 61H213M112 80H241M112 99H192M112 118H229" stroke="#83f5dc" stroke-width="6" stroke-linecap="square" opacity=".78"/>
    <path d="M24 196H338L383 259H-20Z" fill="#a69778" stroke="#ded0ab" stroke-width="5"/>
    <path d="M19 215H330M7 234H347" stroke="#5a5141" stroke-width="7" stroke-dasharray="13 6"/>
    <circle cx="279" cy="169" r="5" fill="#ffb144"/>
  </g>
  <text x="255" y="560" fill="#8ef8e5" font-family="monospace" font-size="16" font-weight="700" text-anchor="middle">CLICK THE MACHINE // EARN BYTES</text>

  <text x="558" y="128" fill="#baf8ef" font-family="monospace" font-size="18" font-weight="700" letter-spacing="3">RUNNING PROGRAMS</text>
  <g font-family="monospace">
    <g transform="translate(558 168)">
      <rect width="520" height="82" fill="#0b1b21" stroke="#315660"/>
      <rect width="8" height="82" fill="#49d1b1"/>
      <text x="28" y="34" fill="#d7fffb" font-size="19" font-weight="700">SHELL SCRIPT</text>
      <text x="490" y="34" fill="#8ef8e5" font-size="18" text-anchor="end">x150</text>
      <rect x="28" y="52" width="462" height="8" fill="#172d32"/>
      <rect x="28" y="52" width="368" height="8" fill="#3ab79f"/>
    </g>
    <g transform="translate(558 266)">
      <rect width="520" height="82" fill="#0b1b21" stroke="#315660"/>
      <rect width="8" height="82" fill="#4eb7cf"/>
      <text x="28" y="34" fill="#d7fffb" font-size="19" font-weight="700">PYTHON BOT</text>
      <text x="490" y="34" fill="#8ef8e5" font-size="18" text-anchor="end">x80</text>
      <rect x="28" y="52" width="462" height="8" fill="#172d32"/>
      <rect x="28" y="52" width="292" height="8" fill="#3998ae"/>
    </g>
    <g transform="translate(558 364)">
      <rect width="520" height="82" fill="#0b1b21" stroke="#315660"/>
      <rect width="8" height="82" fill="#dfad57"/>
      <text x="28" y="34" fill="#d7fffb" font-size="19" font-weight="700">PACKET SNIFFER</text>
      <text x="490" y="34" fill="#8ef8e5" font-size="18" text-anchor="end">x24</text>
      <rect x="28" y="52" width="462" height="8" fill="#172d32"/>
      <rect x="28" y="52" width="197" height="8" fill="#b98b40"/>
    </g>
    <text x="558" y="502" fill="#698f96" font-size="15">NEXT MILESTONE: 200 PROGRAMS</text>
    <text x="558" y="533" fill="#baf8ef" font-size="21" font-weight="700">INFRASTRUCTURE GROWS WHILE YOU PLAY.</text>
  </g>

  <text x="1162" y="128" fill="#baf8ef" font-family="monospace" font-size="18" font-weight="700" letter-spacing="3">STORE</text>
  <g font-family="monospace">
    <g transform="translate(1162 168)">
      <rect width="388" height="100" fill="#102521" stroke="#4a9b7c" stroke-width="2"/>
      <path d="M0 0H35M0 0V35M388 100H353M388 100V65" stroke="#73e2b8" stroke-width="5"/>
      <text x="22" y="36" fill="#d7fffb" font-size="19" font-weight="700">WEB SCRAPER</text>
      <text x="22" y="67" fill="#7fb1b6" font-size="14">Harvests public data.</text>
      <text x="366" y="67" fill="#78e5b9" font-size="16" font-weight="700" text-anchor="end">800 B</text>
    </g>
    <g transform="translate(1162 286)">
      <rect width="388" height="100" fill="#101d22" stroke="#35515a" stroke-width="2"/>
      <text x="22" y="36" fill="#d7fffb" font-size="19" font-weight="700">NETWORK UPGRADE</text>
      <text x="22" y="67" fill="#7fb1b6" font-size="14">Multiply automatic income.</text>
      <text x="366" y="67" fill="#dfad57" font-size="16" font-weight="700" text-anchor="end">8,000 B</text>
    </g>
    <g transform="translate(1162 404)">
      <rect width="388" height="100" fill="#070c0e" stroke="#2c4147" stroke-width="2"/>
      <text x="22" y="36" fill="#65767a" font-size="19" font-weight="700">QUANTUM ALGORITHM</text>
      <text x="22" y="67" fill="#59676a" font-size="14">Reach a later era.</text>
      <text x="366" y="67" fill="#bd6b58" font-size="16" font-weight="700" text-anchor="end">LOCKED</text>
    </g>
  </g>

  <rect x="0" y="606" width="1600" height="34" fill="#02080a"/>
  <text x="26" y="629" fill="#6e999d" font-family="monospace" font-size="13">ONE OLD TERMINAL. AN UNREASONABLE AMOUNT OF INFRASTRUCTURE.</text>
</svg>
